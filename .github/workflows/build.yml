name: Forgiatura Uncensored
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Estrazione Sorgente (LFS ATTIVO PER FILE PESANTI)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - name: Allestimento Fucina (Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fusione APK Completa (Ignora Errori Minori)
        run: chmod +x gradlew && ./gradlew assembleDebug -x lint
      - name: Salvataggio Arma Finale
        uses: actions/upload-artifact@v4
        with:
          name: LocalDream_Uncensored_PK300_Fix
          path: app/build/outputs/apk/**/*.apk
